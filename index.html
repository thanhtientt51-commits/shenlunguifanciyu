function getFiltered(){
  var pool;if(curCat==='all')pool=DB.slice();else if(curCat==='fav')pool=DB.filter(function(item){return isFav(item.w)});else pool=(catMap[curCat]||[]).slice();
  var gs=document.getElementById('globalSearch').value.trim().toLowerCase(),sf=document.getElementById('sideFilter').value.trim().toLowerCase();

  if(sf)pool=pool.filter(function(item){return item.w.indexOf(sf)!==-1||item.s.indexOf(sf)!==-1});

}
